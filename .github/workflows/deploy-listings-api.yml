name: Deploy AutoNext.Platform.Listings.API to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [master, main]

jobs:
  # ==================== BUILD ONCE ====================
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore AutoNext.Platform.Listings.API.csproj

      - name: Publish API for Development
        run: dotnet publish AutoNext.Platform.Listings.API.csproj --configuration Release --output ./publish/dev -p:EnvironmentName=Development

      - name: Publish API for Production
        run: dotnet publish AutoNext.Platform.Listings.API.csproj --configuration Release --output ./publish/prod -p:EnvironmentName=Production

      - name: Copy web.config to Dev package
        shell: pwsh
        run: Copy-Item web.config ./publish/dev/web.config -Force

      - name: Copy web.config to Prod package
        shell: pwsh
        run: Copy-Item web.config ./publish/prod/web.config -Force

      - name: Prepare Dev deployment package
        shell: pwsh
        run: |
          $info = @"
          Deployed: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC' -AsUTC)
          Commit SHA: ${{ github.sha }}
          PR Number: #${{ github.event.pull_request.number }}
          "@
          Set-Content -Path ./publish/dev/deployment-info.txt -Value $info

      - name: Prepare Prod deployment package
        shell: pwsh
        run: |
          $info = @"
          Deployed: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC' -AsUTC)
          Commit SHA: ${{ github.sha }}
          PR Number: #${{ github.event.pull_request.number }}
          "@
          Set-Content -Path ./publish/prod/deployment-info.txt -Value $info

      # ==================== CLEAN DEV PUBLISH FOLDER ====================
      - name: Remove Production config files from Dev package
        shell: pwsh
        run: |
          # Remove any Production-specific files from Dev package
          $prodFiles = @(
            "./publish/dev/appsettings.Production.json",
            "./publish/dev/appsettings.Production.json"
          )
          
          foreach ($file in $prodFiles) {
            if (Test-Path $file) {
              Remove-Item $file -Force
              Write-Host "Removed $file from Dev package"
            }
          }

      # ==================== CLEAN PROD PUBLISH FOLDER ====================
      - name: Remove Development config files from Prod package
        shell: pwsh
        run: |
          # Remove any Development-specific files from Prod package
          $devFiles = @(
            "./publish/prod/appsettings.Development.json",
            "./publish/prod/appsettings.Development.json"
          )
          
          foreach ($file in $devFiles) {
            if (Test-Path $file) {
              Remove-Item $file -Force
              Write-Host "Removed $file from Prod package"
            }
          }

      # ==================== INJECT DEV SECRETS ====================
      - name: Inject Dev secrets into Dev config files
        shell: pwsh
        env:
          MONGODB_DEV_CONNECTION_STRING: ${{ secrets.MONGODB_DEV_CONNECTION_STRING }}
          JWT_DEV_KEY: ${{ secrets.JWT_DEV_KEY }}
        run: |
          # Only process Dev-specific JSON files
          $configFiles = @(
            "./publish/dev/appsettings.json",
            "./publish/dev/appsettings.Development.json"
          )
          
          foreach ($file in $configFiles) {
            if (Test-Path $file) {
              Write-Host "Processing DEV: $file"
              $content = Get-Content $file -Raw
              
              # Replace Dev placeholders only
              $content = $content -replace '__MONGODB_DEV_CONNECTION_STRING__', $env:MONGODB_DEV_CONNECTION_STRING
              $content = $content -replace '__JWT_DEV_KEY__', $env:JWT_DEV_KEY
              
              # Also handle any Prod placeholders that might have leaked (replace with Dev values)
              $content = $content -replace '__MONGODB_PROD_CONNECTION_STRING__', $env:MONGODB_DEV_CONNECTION_STRING
              $content = $content -replace '__REDIS_PROD_CONNECTION_STRING__', "redis://localhost:6379"
              $content = $content -replace '__JWT_PROD_KEY__', $env:JWT_DEV_KEY
              $content = $content -replace '__APPINSIGHTS_CONNECTION_STRING__', ""
              
              Set-Content -Path $file -Value $content -NoNewline
            }
          }

      # ==================== INJECT PROD SECRETS ====================
      - name: Inject Prod secrets into Prod config files
        shell: pwsh
        env:
          MONGODB_PROD_CONNECTION_STRING: ${{ secrets.MONGODB_PROD_CONNECTION_STRING }}
          REDIS_PROD_CONNECTION_STRING: ${{ secrets.REDIS_PROD_CONNECTION_STRING }}
          JWT_PROD_KEY: ${{ secrets.JWT_PROD_KEY }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: |
          # Only process Prod-specific JSON files
          $configFiles = @(
            "./publish/prod/appsettings.json",
            "./publish/prod/appsettings.Production.json"
          )
          
          foreach ($file in $configFiles) {
            if (Test-Path $file) {
              Write-Host "Processing PROD: $file"
              $content = Get-Content $file -Raw
              
              # Replace Prod placeholders
              $content = $content -replace '__MONGODB_PROD_CONNECTION_STRING__', $env:MONGODB_PROD_CONNECTION_STRING
              $content = $content -replace '__REDIS_PROD_CONNECTION_STRING__', $env:REDIS_PROD_CONNECTION_STRING
              $content = $content -replace '__JWT_PROD_KEY__', $env:JWT_PROD_KEY
              $content = $content -replace '__APPINSIGHTS_CONNECTION_STRING__', $env:APPINSIGHTS_CONNECTION_STRING
              
              # Replace any Dev placeholders that might have leaked (shouldn't happen in Prod)
              $content = $content -replace '__MONGODB_DEV_CONNECTION_STRING__', $env:MONGODB_PROD_CONNECTION_STRING
              $content = $content -replace '__JWT_DEV_KEY__', $env:JWT_PROD_KEY
              
              Set-Content -Path $file -Value $content -NoNewline
            }
          }

      # ==================== VERIFY NO PLACEHOLDERS REMAIN ====================
      - name: Verify Dev config has no placeholders
        shell: pwsh
        run: |
          $configFiles = @(
            "./publish/dev/appsettings.json",
            "./publish/dev/appsettings.Development.json"
          )
          
          foreach ($file in $configFiles) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw
              # Check for any remaining placeholders (both Dev and Prod patterns)
              if ($content -match '__\w+__') {
                Write-Error "❌ Dev file $($file) still contains placeholder: $($Matches[0])"
                Write-Host "File content snippet:"
                Write-Host $content.Substring(0, [Math]::Min(500, $content.Length))
                exit 1
              }
              Write-Host "✅ Dev file $($file) verified"
            }
          }

      - name: Verify Prod config has no placeholders
        shell: pwsh
        run: |
          $configFiles = @(
            "./publish/prod/appsettings.json",
            "./publish/prod/appsettings.Production.json"
          )
          
          foreach ($file in $configFiles) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw
              # Check for any remaining placeholders
              if ($content -match '__\w+__') {
                Write-Error "❌ Prod file $($file) still contains placeholder: $($Matches[0])"
                Write-Host "File content snippet:"
                Write-Host $content.Substring(0, [Math]::Min(500, $content.Length))
                exit 1
              }
              Write-Host "✅ Prod file $($file) verified"
            }
          }

      - name: Upload Dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/
          retention-days: 1

      - name: Upload Prod artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/
          retention-days: 1

  # ==================== DEPLOY TO DEVELOPMENT ====================
  deploy-dev:
    needs: build
    runs-on: windows-latest
    environment: Development

    steps:
      - name: Download Dev artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/

      - name: Deploy to Dev via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/dev/
          server-dir: ${{ secrets.FTP_DEV_PATH }}/
          port: 21

  # ==================== DEPLOY TO PRODUCTION ====================
  deploy-production:
    needs: deploy-dev
    runs-on: windows-latest
    environment: Production

    steps:
      - name: Download Prod artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/

      - name: Deploy to Prod via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/prod/
          server-dir: ${{ secrets.FTP_PROD_PATH }}/
          port: 21
