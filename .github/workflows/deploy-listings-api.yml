name: Deploy AutoNext.Platform.Listings.API to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [master, main]

jobs:
  # ==================== BUILD ONCE ====================
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore AutoNext.Platform.Listings.API.csproj

      - name: Publish API for Development
        run: dotnet publish AutoNext.Platform.Listings.API.csproj --configuration Release --output ./publish/dev -p:EnvironmentName=Development

      - name: Publish API for Production
        run: dotnet publish AutoNext.Platform.Listings.API.csproj --configuration Release --output ./publish/prod -p:EnvironmentName=Production

      - name: Copy web.config to Dev package
        shell: bash
        run: cp web.config ./publish/dev/web.config

      - name: Copy web.config to Prod package
        shell: bash
        run: cp web.config ./publish/prod/web.config

      - name: Prepare Dev deployment package
        shell: bash
        run: |
          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > ./publish/dev/deployment-info.txt
          echo "Commit SHA: ${{ github.sha }}" >> ./publish/dev/deployment-info.txt
          echo "PR Number: #${{ github.event.pull_request.number }}" >> ./publish/dev/deployment-info.txt

      - name: Prepare Prod deployment package
        shell: bash
        run: |
          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > ./publish/prod/deployment-info.txt
          echo "Commit SHA: ${{ github.sha }}" >> ./publish/prod/deployment-info.txt
          echo "PR Number: #${{ github.event.pull_request.number }}" >> ./publish/prod/deployment-info.txt

      - name: Inject Dev secrets into config
        shell: bash
        env:
          MONGODB_DEV_CONNECTION_STRING: ${{ secrets.MONGODB_DEV_CONNECTION_STRING }}
          JWT_DEV_KEY: ${{ secrets.JWT_DEV_KEY }}
        run: |
          sed \
            -e "s|__MONGODB_DEV_CONNECTION_STRING__|${MONGODB_DEV_CONNECTION_STRING}|g" \
            -e "s|__JWT_DEV_KEY__|${JWT_DEV_KEY}|g" \
            appsettings.Development.json > ./publish/dev/appsettings.Development.json

      - name: Inject Prod secrets into config
        shell: bash
        env:
          MONGODB_PROD_CONNECTION_STRING: ${{ secrets.MONGODB_PROD_CONNECTION_STRING }}
          REDIS_PROD_CONNECTION_STRING: ${{ secrets.REDIS_PROD_CONNECTION_STRING }}
          JWT_PROD_KEY: ${{ secrets.JWT_PROD_KEY }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: |
          sed \
            -e "s|__MONGODB_PROD_CONNECTION_STRING__|${MONGODB_PROD_CONNECTION_STRING}|g" \
            -e "s|__REDIS_PROD_CONNECTION_STRING__|${REDIS_PROD_CONNECTION_STRING}|g" \
            -e "s|__JWT_PROD_KEY__|${JWT_PROD_KEY}|g" \
            -e "s|__APPINSIGHTS_CONNECTION_STRING__|${APPINSIGHTS_CONNECTION_STRING}|g" \
            appsettings.Production.json > ./publish/prod/appsettings.Production.json

      - name: Upload Dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/
          retention-days: 1

      - name: Upload Prod artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/
          retention-days: 1

  # ==================== DEPLOY TO DEVELOPMENT ====================
  deploy-dev:
    needs: build
    runs-on: windows-latest
    environment: Development

    steps:
      - name: Download Dev artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/

      - name: Deploy to Dev via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/dev/
          server-dir: ${{ secrets.FTP_DEV_PATH }}/
          port: 21

  # ==================== DEPLOY TO PRODUCTION ====================
  deploy-production:
    needs: deploy-dev
    runs-on: windows-latest
    environment: Production

    steps:
      - name: Download Prod artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/

      - name: Deploy to Prod via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/prod/
          server-dir: ${{ secrets.FTP_PROD_PATH }}/
          port: 21
