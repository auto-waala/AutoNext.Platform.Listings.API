name: Deploy AutoNext.Platform.Listings.API to Dev and Production

on:
  pull_request:
    types: [closed]
    branches: [master, main]

jobs:
  # ==================== BUILD ONCE ====================
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore AutoNext.Platform.Listings.API.csproj

      - name: Publish API for Development
        run: dotnet publish AutoNext.Platform.Listings.API.csproj --configuration Release --output ./publish/dev -p:EnvironmentName=Development

      - name: Publish API for Production
        run: dotnet publish AutoNext.Platform.Listings.API.csproj --configuration Release --output ./publish/prod -p:EnvironmentName=Production

      - name: Copy web.config to Dev package
        shell: pwsh
        run: Copy-Item web.config ./publish/dev/web.config -Force

      - name: Copy web.config to Prod package
        shell: pwsh
        run: Copy-Item web.config ./publish/prod/web.config -Force

      - name: Prepare Dev deployment package
        shell: pwsh
        run: |
          $info = @"
          Deployed: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC' -AsUTC)
          Commit SHA: ${{ github.sha }}
          PR Number: #${{ github.event.pull_request.number }}
          "@
          Set-Content -Path ./publish/dev/deployment-info.txt -Value $info

      - name: Prepare Prod deployment package
        shell: pwsh
        run: |
          $info = @"
          Deployed: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC' -AsUTC)
          Commit SHA: ${{ github.sha }}
          PR Number: #${{ github.event.pull_request.number }}
          "@
          Set-Content -Path ./publish/prod/deployment-info.txt -Value $info

      # ==================== CRITICAL: CLEAN DEV FOLDER ====================
      - name: Remove Production files from Dev package
        shell: pwsh
        run: |
          Write-Host "Cleaning Dev package..."
          $devPath = "./publish/dev"

          $prodFile = Join-Path $devPath "appsettings.Production.json"
          if (Test-Path $prodFile) {
            Remove-Item $prodFile -Force
            Write-Host "✅ Removed appsettings.Production.json from Dev"
          }

          Get-ChildItem -Path $devPath -Filter "*Production*" | ForEach-Object {
            Remove-Item $_.FullName -Force
            Write-Host "✅ Removed $($_.Name) from Dev"
          }

          Write-Host "`nDev folder contents after cleanup:"
          Get-ChildItem -Path $devPath -Filter "*.json" | ForEach-Object {
            Write-Host "  - $($_.Name)"
          }

      # ==================== CRITICAL: CLEAN PROD FOLDER ====================
      - name: Remove Development files from Prod package
        shell: pwsh
        run: |
          Write-Host "Cleaning Prod package..."
          $prodPath = "./publish/prod"

          $devFile = Join-Path $prodPath "appsettings.Development.json"
          if (Test-Path $devFile) {
            Remove-Item $devFile -Force
            Write-Host "✅ Removed appsettings.Development.json from Prod"
          }

          Get-ChildItem -Path $prodPath -Filter "*Development*" | ForEach-Object {
            Remove-Item $_.FullName -Force
            Write-Host "✅ Removed $($_.Name) from Prod"
          }

          Write-Host "`nProd folder contents after cleanup:"
          Get-ChildItem -Path $prodPath -Filter "*.json" | ForEach-Object {
            Write-Host "  - $($_.Name)"
          }

      # ==================== INJECT DEV SECRETS ====================
      # BUG FIX: Dev package contains appsettings.json + appsettings.Development.json
      # Both files must be processed. appsettings.Development.json has __MONGODB_DEV_CONNECTION_STRING__
      - name: Inject Dev secrets
        shell: pwsh
        env:
          MONGODB_DEV_CONNECTION_STRING: ${{ secrets.MONGODB_DEV_CONNECTION_STRING }}
          JWT_DEV_KEY: ${{ secrets.JWT_DEV_KEY }}
        run: |
          # Validate secrets are actually set — fail fast instead of deploying broken config
          if ([string]::IsNullOrWhiteSpace($env:MONGODB_DEV_CONNECTION_STRING)) {
            Write-Error "❌ MONGODB_DEV_CONNECTION_STRING secret is not set in GitHub!"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:JWT_DEV_KEY)) {
            Write-Error "❌ JWT_DEV_KEY secret is not set in GitHub!"
            exit 1
          }

          $devFiles = @(
            "./publish/dev/appsettings.json",
            "./publish/dev/appsettings.Development.json"
          )

          foreach ($file in $devFiles) {
            if (Test-Path $file) {
              Write-Host "Processing Dev: $file"
              $content = Get-Content $file -Raw
              $content = $content -replace '__MONGODB_DEV_CONNECTION_STRING__', $env:MONGODB_DEV_CONNECTION_STRING
              $content = $content -replace '__JWT_DEV_KEY__', $env:JWT_DEV_KEY
              # Safety: clear any remaining prod placeholders so they don't ship
              $content = $content -replace '__MONGODB_PROD_CONNECTION_STRING__', $env:MONGODB_DEV_CONNECTION_STRING
              $content = $content -replace '__JWT_PROD_KEY__', $env:JWT_DEV_KEY
              $content = $content -replace '__APPINSIGHTS_CONNECTION_STRING__', ""
              Set-Content -Path $file -Value $content -NoNewline
              Write-Host "✅ Secrets injected into $file"
            } else {
              Write-Host "⚠️ $file not found — skipping"
            }
          }

      # ==================== INJECT PROD SECRETS ====================
      # BUG FIX: Prod package contains appsettings.json + appsettings.Production.json
      # appsettings.Production.json has __MONGODB_PROD_CONNECTION_STRING__ — this MUST be replaced.
      # Previously this worked only if the secret was set; now we fail fast if it isn't.
      - name: Inject Prod secrets
        shell: pwsh
        env:
          MONGODB_PROD_CONNECTION_STRING: ${{ secrets.MONGODB_PROD_CONNECTION_STRING }}
          JWT_PROD_KEY: ${{ secrets.JWT_PROD_KEY }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
        run: |
          # Validate secrets are actually set — this is the most common cause of SCRAM-SHA-1 errors
          if ([string]::IsNullOrWhiteSpace($env:MONGODB_PROD_CONNECTION_STRING)) {
            Write-Error "❌ MONGODB_PROD_CONNECTION_STRING secret is not set in GitHub!"
            Write-Error "   Go to: GitHub repo → Settings → Secrets → Actions → New repository secret"
            Write-Error "   Name:  MONGODB_PROD_CONNECTION_STRING"
            Write-Error "   Value: mongodb+srv://<user>:<password>@<cluster>.mongodb.net/Autonext_Listings_Prod?retryWrites=true&w=majority&appName=Autonext"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:JWT_PROD_KEY)) {
            Write-Error "❌ JWT_PROD_KEY secret is not set in GitHub!"
            exit 1
          }

          $prodFiles = @(
            "./publish/prod/appsettings.json",
            "./publish/prod/appsettings.Production.json"
          )

          foreach ($file in $prodFiles) {
            if (Test-Path $file) {
              Write-Host "Processing Prod: $file"
              $content = Get-Content $file -Raw
              $content = $content -replace '__MONGODB_PROD_CONNECTION_STRING__', $env:MONGODB_PROD_CONNECTION_STRING
              $content = $content -replace '__JWT_PROD_KEY__', $env:JWT_PROD_KEY
              $content = $content -replace '__APPINSIGHTS_CONNECTION_STRING__', $env:APPINSIGHTS_CONNECTION_STRING
              # Safety: clear any remaining dev placeholders
              $content = $content -replace '__MONGODB_DEV_CONNECTION_STRING__', $env:MONGODB_PROD_CONNECTION_STRING
              $content = $content -replace '__JWT_DEV_KEY__', $env:JWT_PROD_KEY
              Set-Content -Path $file -Value $content -NoNewline
              Write-Host "✅ Secrets injected into $file"
            } else {
              Write-Host "⚠️ $file not found — skipping"
            }
          }

      # ==================== VERIFY DEV CONFIG ====================
      - name: Verify Dev config
        shell: pwsh
        run: |
          Write-Host "Verifying Dev configuration..."
          $devFiles = @(
            "./publish/dev/appsettings.json",
            "./publish/dev/appsettings.Development.json"
          )

          $hasErrors = $false
          foreach ($file in $devFiles) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw
              Write-Host "Checking $file"
              if ($content -match '__[A-Z_]+__') {
                Write-Error "❌ $file still contains unreplaced placeholder: $($Matches[0])"
                $hasErrors = $true
              } else {
                Write-Host "✅ $file — no placeholders remaining"
              }
            } else {
              Write-Host "⚠️ $file not found"
            }
          }

          if (Test-Path "./publish/dev/appsettings.Production.json") {
            Write-Error "❌ appsettings.Production.json must NOT be in Dev package!"
            $hasErrors = $true
          } else {
            Write-Host "✅ No Production config files in Dev package"
          }

          if ($hasErrors) { exit 1 }

      # ==================== VERIFY PROD CONFIG ====================
      - name: Verify Prod config
        shell: pwsh
        run: |
          Write-Host "Verifying Prod configuration..."
          $prodFiles = @(
            "./publish/prod/appsettings.json",
            "./publish/prod/appsettings.Production.json"
          )

          $hasErrors = $false

          # appsettings.Production.json MUST exist in the prod package
          if (-not (Test-Path "./publish/prod/appsettings.Production.json")) {
            Write-Error "❌ appsettings.Production.json is MISSING from Prod package!"
            Write-Error "   The app will fall back to appsettings.json which has wrong DB name / placeholders."
            $hasErrors = $true
          }

          foreach ($file in $prodFiles) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw
              Write-Host "Checking $file"
              if ($content -match '__[A-Z_]+__') {
                Write-Error "❌ $file still contains unreplaced placeholder: $($Matches[0])"
                $hasErrors = $true
              } else {
                Write-Host "✅ $file — no placeholders remaining"
              }
            } else {
              Write-Host "⚠️ $file not found — skipping check"
            }
          }

          if (Test-Path "./publish/prod/appsettings.Development.json") {
            Write-Error "❌ appsettings.Development.json must NOT be in Prod package!"
            $hasErrors = $true
          } else {
            Write-Host "✅ No Development config files in Prod package"
          }

          if ($hasErrors) { exit 1 }

      - name: Upload Dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/
          retention-days: 1

      - name: Upload Prod artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/
          retention-days: 1

  # ==================== DEPLOY TO DEVELOPMENT ====================
  deploy-dev:
    needs: build
    runs-on: windows-latest
    environment: Development

    steps:
      - name: Download Dev artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-dev
          path: ./publish/dev/

      - name: Deploy to Dev via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/dev/
          server-dir: ${{ secrets.FTP_DEV_PATH }}/
          port: 21

  # ==================== DEPLOY TO PRODUCTION ====================
  deploy-production:
    needs: deploy-dev
    runs-on: windows-latest
    environment: Production

    steps:
      - name: Download Prod artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-prod
          path: ./publish/prod/

      - name: Deploy to Prod via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/prod/
          server-dir: ${{ secrets.FTP_PROD_PATH }}/
          port: 21name: Deploy AutoNext.Platform.Listings.API to Dev and Production

